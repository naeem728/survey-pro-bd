name: survey_pro_bd
description: "Survey Pro BD - 100% Offline Land Surveying App for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  pdf: ^3.10.8
  share_plus: ^7.2.2
  vector_math: ^2.1.4
  intl: ^0.19.0
  image_picker: ^1.0.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/

  fonts:
    - family: Kalpurush
      fonts:
        - asset: assets/fonts/Kalpurush_ANSI.ttf
